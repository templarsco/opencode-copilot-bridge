name: Build Patched OpenCode (Windows)

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      opencode_ref:
        description: 'Git ref to build (branch, tag, or commit). Leave empty for dev HEAD.'
        required: false
        default: ''
      force_build:
        description: 'Force build even if version already released'
        required: false
        default: 'false'

  # Check for new commits on dev branch every 6 hours
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: windows-latest
    steps:
      - name: Checkout bridge repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine OpenCode version
        id: version
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false

          if ("${{ github.event.inputs.opencode_ref }}" -ne "") {
            $ref = "${{ github.event.inputs.opencode_ref }}"
          } else {
            $ref = "dev"
          }

          # Get the latest commit SHA for the ref
          $commitInfo = gh api "repos/anomalyco/opencode/commits/$ref" --jq '{sha: .sha, message: .commit.message}' 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to fetch commit info for ref '$ref': $commitInfo"
            exit 1
          }
          $commit = ($commitInfo | ConvertFrom-Json)
          $sha = $commit.sha.Substring(0, 7)

          # Try to extract version from commit message (e.g. "release: v1.2.17")
          $msg = $commit.message
          if ($msg -match 'v\d+\.\d+\.\d+') {
            $version = $Matches[0]
          } else {
            $version = "dev-$sha"
          }

          Write-Host "OpenCode ref: $ref"
          Write-Host "Commit: $sha"
          Write-Host "Version: $version"
          echo "ref=$ref" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

          # Check if we already have a release for this version
          $releases = (gh release list --repo $env:GITHUB_REPOSITORY --json tagName --jq '.[].tagName' 2>$null) -split "`n"
          $tagName = "bridge-$version"
          if ($releases -contains $tagName -and "${{ github.event.inputs.force_build }}" -ne "true") {
            Write-Host "Release $tagName already exists. Skipping."
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT }}

      - name: Clone OpenCode source
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ref = "${{ steps.version.outputs.ref }}"
          git clone --depth 1 --branch $ref "https://x-access-token:${{ secrets.OPENCODE_PAT }}@github.com/anomalyco/opencode.git" opencode-src
          Write-Host "Cloned OpenCode ref: $ref"

      - name: Apply patch
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          Push-Location opencode-src
          git apply --check ..\patches\copilot.ts.patch 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Patch check failed. Attempting direct apply..." -ForegroundColor Yellow
          }
          git apply ..\patches\copilot.ts.patch
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Patch does not apply cleanly to this version. May need updating."
            exit 1
          }
          Write-Host "Patch applied successfully"
          Pop-Location

      - name: Install dependencies
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Push-Location opencode-src
          bun install
          Pop-Location

      - name: Build Windows binary
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Push-Location opencode-src
          bun run ./packages/opencode/script/build.ts --single
          Pop-Location

          $exe = "opencode-src\packages\opencode\dist\opencode-windows-x64\bin\opencode.exe"
          if (Test-Path $exe) {
            Write-Host "Build successful: $exe"
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Binary size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "Build output not found"
            exit 1
          }

      - name: Create release
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $version = "${{ steps.version.outputs.version }}"
          $sha = "${{ steps.version.outputs.sha }}"
          $tag = "bridge-$version"
          $exe = "opencode-src\packages\opencode\dist\opencode-windows-x64\bin\opencode.exe"

          # Rename binary with version
          $dest = "opencode-copilot-bridge-$version-windows-x64.exe"
          Copy-Item $exe $dest

          # Write release notes to file
          $notes = @"
          Patched OpenCode $version ($sha) with Copilot JWT bridge for full model access.

          ## What's included
          - Pre-built Windows x64 binary with JWT token exchange patch
          - Unlocks models available in VS Code Copilot but not yet in OpenCode

          ## Requirements
          - VS Code with GitHub Copilot extension (authenticated)
          - Windows x64

          ## Usage
          1. Download the .exe below
          2. Replace your installed OpenCode binary:
             - Desktop: ``%LOCALAPPDATA%\OpenCode Beta\opencode-cli.exe``
             - CLI: ``%USERPROFILE%\.bun\bin\opencode.exe``
          3. Run ``bun run scripts/discover-models.ts --apply`` to auto-discover and configure new models
          4. Restart OpenCode

          Based on OpenCode $version (anomalyco/opencode@$sha)
          "@

          # Trim leading whitespace from each line (heredoc indentation)
          $notes = ($notes -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          $notes | Out-File -FilePath notes.md -Encoding utf8

          gh release create $tag $dest --title "OpenCode Copilot Bridge $version" --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
