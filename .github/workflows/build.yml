name: Build Patched OpenCode (Windows)

on:
  workflow_dispatch:
    inputs:
      opencode_ref:
        description: 'Stable only: Git ref to build (branch, tag, or commit). Leave empty for latest stable release.'
        required: false
        default: ''
      force_build:
        description: 'Force build even if release already exists'
        required: false
        default: 'false'
      channel:
        description: 'Channel to build'
        required: false
        default: 'both'
        type: choice
        options:
          - stable
          - beta
          - both

  # Check both stable and beta releases every 6 hours
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  check-and-build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.channel == 'both' || github.event.inputs.channel == matrix.channel }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        channel:
          - stable
          - beta

    steps:
      - name: Checkout bridge repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine upstream version and release metadata
        id: version
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $channel = "${{ matrix.channel }}"

          if ($channel -eq "stable") {
            $repo = "anomalyco/opencode"
            if ("${{ github.event.inputs.opencode_ref }}" -ne "") {
              $ref = "${{ github.event.inputs.opencode_ref }}"
              $version = $ref
              Write-Host "Using manual stable ref: $ref"
            } else {
              $tagJson = gh release view --repo anomalyco/opencode --json tagName 2>&1
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Failed to fetch latest stable release: $tagJson"
                exit 1
              }
              $tag = ($tagJson | ConvertFrom-Json).tagName
              $ref = $tag
              $version = $tag
              Write-Host "Latest stable release: $tag"
            }

            $releaseTag = "bridge-$version"
            $releaseTitle = "OpenCode Copilot Bridge $version"
            $channelLabel = "Stable"
          } else {
            $repo = "anomalyco/opencode-beta"
            $tagJson = gh release view --repo anomalyco/opencode-beta --json tagName 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to fetch latest beta release: $tagJson"
              exit 1
            }
            $tag = ($tagJson | ConvertFrom-Json).tagName
            $ref = $tag
            $version = $tag
            Write-Host "Latest beta release: $tag"

            if ($tag -notmatch '^v0\.0\.0-beta-(\d{12})$') {
              Write-Error "Beta tag format is unexpected: $tag"
              exit 1
            }

            $timestamp = $matches[1]
            $releaseTag = "bridge-beta-$timestamp"
            $releaseTitle = "OpenCode Copilot Bridge Beta $version"
            $channelLabel = "Beta"
          }

          $shaFull = gh api "repos/$repo/commits/$ref" --jq '.sha' 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to fetch commit SHA for $repo@$ref: $shaFull"
            exit 1
          }

          $sha = $shaFull.Substring(0, 7)
          $asset = "opencode-copilot-bridge-$version-$channel-windows-x64.exe"
          $forceBuild = "${{ github.event.inputs.force_build }}" -eq "true"

          gh release view $releaseTag --repo $env:GITHUB_REPOSITORY --json tagName 1>$null 2>$null
          $exists = $LASTEXITCODE -eq 0

          if ($exists -and -not $forceBuild) {
            Write-Host "Release $releaseTag already exists for $channel. Skipping."
            $skip = "true"
          } else {
            $skip = "false"
          }

          echo "repo=$repo" >> $env:GITHUB_OUTPUT
          echo "channel=$channel" >> $env:GITHUB_OUTPUT
          echo "channel_label=$channelLabel" >> $env:GITHUB_OUTPUT
          echo "ref=$ref" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          echo "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          echo "release_title=$releaseTitle" >> $env:GITHUB_OUTPUT
          echo "asset=$asset" >> $env:GITHUB_OUTPUT
          echo "skip=$skip" >> $env:GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT }}

      - name: Clone OpenCode source
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $repo = "${{ steps.version.outputs.repo }}"
          $ref = "${{ steps.version.outputs.ref }}"
          git clone --depth 1 --branch $ref "https://x-access-token:${{ secrets.OPENCODE_PAT }}@github.com/$repo.git" opencode-src
          Write-Host "Cloned $repo ref: $ref"

      - name: Apply Copilot JWT patch
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          bun run scripts/patch-copilot.ts opencode-src/packages/opencode/src/plugin/copilot.ts
          if ($LASTEXITCODE -eq 1) {
            Write-Error "Patch script failed — see output above"
            exit 1
          }

      - name: Install dependencies
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Push-Location opencode-src
          bun install
          Pop-Location

      - name: Build Windows binary
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $env:OPENCODE_VERSION = "bridge-$version"

          Push-Location opencode-src
          bun run ./packages/opencode/script/build.ts --single
          Pop-Location

          $exe = "opencode-src\packages\opencode\dist\opencode-windows-x64\bin\opencode.exe"
          if (Test-Path $exe) {
            Write-Host "Build successful: $exe"
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Binary size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "Build output not found"
            exit 1
          }

      - name: Create release
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $releaseTag = "${{ steps.version.outputs.release_tag }}"
          $releaseTitle = "${{ steps.version.outputs.release_title }}"
          $version = "${{ steps.version.outputs.version }}"
          $sha = "${{ steps.version.outputs.sha }}"
          $channel = "${{ steps.version.outputs.channel }}"
          $channelLabel = "${{ steps.version.outputs.channel_label }}"
          $repo = "${{ steps.version.outputs.repo }}"
          $asset = "${{ steps.version.outputs.asset }}"
          $exe = "opencode-src\packages\opencode\dist\opencode-windows-x64\bin\opencode.exe"

          Copy-Item $exe $asset

          $notes = @"
          Patched OpenCode $version ($sha) for the $channelLabel channel with Copilot JWT bridge.

          ## Channel
          - $channelLabel

          ## Upstream
          - Repository: $repo
          - Version tag: $version
          - Commit: $sha

          ## What's included
          - Pre-built Windows x64 CLI binary
          - Copilot JWT patch for full model access

          ## Usage
          1. Download the .exe below
          2. Replace your installed OpenCode binary:
             - Desktop (Stable): ``%LOCALAPPDATA%\OpenCode\opencode-cli.exe``
             - Desktop (Beta): ``%LOCALAPPDATA%\OpenCode Beta\opencode-cli.exe``
             - CLI (Bun): ``%USERPROFILE%\.bun\bin\opencode.exe``
          "@

          $notes = ($notes -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          $notes | Out-File -FilePath notes.md -Encoding utf8

          gh release create $releaseTag $asset --title $releaseTitle --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
