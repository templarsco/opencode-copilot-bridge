name: Build Patched OpenCode

on:
  workflow_dispatch:
    inputs:
      opencode_ref:
        description: 'Git ref to build (branch, tag, or commit). Leave empty for latest channel release.'
        required: false
        default: ''
      force_build:
        description: 'Force build even if version already released'
        required: false
        default: 'false'
      channel:
        description: 'Which channel(s) to build'
        required: false
        default: 'both'
        type: choice
        options:
          - stable
          - beta
          - both

  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel:
          - stable
          - beta
    steps:
      - name: Check channel filter
        id: filter
        shell: pwsh
        run: |
          $channel = "${{ matrix.channel }}"
          $inputChannel = "${{ github.event.inputs.channel }}"
          $eventName = "${{ github.event_name }}"
          if ($eventName -eq 'workflow_dispatch' -and $inputChannel -ne 'both' -and $inputChannel -ne $channel) {
            Write-Host "Skipping $channel channel (requested: $inputChannel)"
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout bridge repo
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Bun
        if: steps.filter.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Determine channel version
        if: steps.filter.outputs.skip != 'true'
        id: version
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false

          $channel = "${{ matrix.channel }}"
          $overrideRef = "${{ github.event.inputs.opencode_ref }}"
          $forceBuild = "${{ github.event.inputs.force_build }}"

          if ($channel -eq "stable") {
            $sourceRepo = "anomalyco/opencode"
            $releaseRepo = "anomalyco/opencode"
            $channelDisplay = "Stable"
          } else {
            $sourceRepo = "anomalyco/opencode"
            $releaseRepo = "anomalyco/opencode-beta"  # release-only repo for tag discovery
            $channelDisplay = "Beta"
          }

          if ($overrideRef -ne "") {
            $ref = $overrideRef
            $version = $overrideRef
            Write-Host "Manual override ref for $channel channel: $ref"
          } else {
            $tagJson = gh release view --repo $releaseRepo --json tagName 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to fetch latest release from ${releaseRepo}: $tagJson"
              exit 1
            }
            $tag = ($tagJson | ConvertFrom-Json).tagName
            $ref = $tag
            $version = $tag
            Write-Host "Latest $channel release: $tag"
          }

          if ($channel -eq "stable") {
            $releaseTag = "bridge-$version"
            $releaseTitle = "OpenCode Copilot Bridge $version"
            $assetName = "opencode-copilot-bridge-$version-stable-windows-x64.exe"
          } else {
            if ($version -match '^v0\.0\.0-beta-(\d{12})$') {
              $betaTimestamp = $Matches[1]
            } elseif ($version -match '(\d{12})$') {
              $betaTimestamp = $Matches[1]
            } else {
              $betaTimestamp = Get-Date -Format "yyyyMMddHHmm"
              Write-Warning "Beta timestamp not found in '$version'. Using current timestamp: $betaTimestamp"
            }
            $releaseTag = "bridge-beta-$betaTimestamp"
            $releaseTitle = "OpenCode Copilot Bridge Beta $version"
            $assetName = "opencode-copilot-bridge-$version-beta-windows-x64.exe"
          }

          # Always get SHA from the stable source tag (beta uses same source as stable)
          $stableRef = $ref
          if ($channel -eq "beta") {
            # For beta, we need the latest stable tag to clone source from
            $stableTagJson = gh release view --repo anomalyco/opencode --json tagName 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to fetch stable release for source: $stableTagJson"
              exit 1
            }
            $stableRef = ($stableTagJson | ConvertFrom-Json).tagName
            Write-Host "Beta: using stable source ref $stableRef for build"
          }
          $shaFull = gh api "repos/$sourceRepo/commits/$stableRef" --jq '.sha' 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to fetch commit SHA: $shaFull"
            exit 1
          }
          $sha = $shaFull.Substring(0, 7)

          gh release view $releaseTag --repo $env:GITHUB_REPOSITORY --json tagName 1>$null 2>$null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $LASTEXITCODE = 0  # Reset to avoid PowerShell treating non-zero as error
          if ($releaseExists -and $forceBuild -ne "true") {
            Write-Host "Release $releaseTag already exists for channel $channel. Skipping."
            $skip = "true"
          } else {
            $skip = "false"
          }

          Write-Host "Channel: $channel"
          Write-Host "Source repo: $sourceRepo"
          Write-Host "OpenCode ref: $ref"
          Write-Host "Version: $version"
          Write-Host "Commit: $sha"
          Write-Host "Release tag: $releaseTag"
          Write-Host "Asset name: $assetName"

          echo "channel=$channel" >> $env:GITHUB_OUTPUT
          echo "channel_display=$channelDisplay" >> $env:GITHUB_OUTPUT
          echo "source_repo=$sourceRepo" >> $env:GITHUB_OUTPUT
          echo "ref=$ref" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          echo "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          echo "release_title=$releaseTitle" >> $env:GITHUB_OUTPUT
          echo "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          echo "skip=$skip" >> $env:GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT }}

      - name: Clone OpenCode source
        if: steps.filter.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ref = "${{ steps.version.outputs.ref }}"
          $channel = "${{ steps.version.outputs.channel }}"

          # Always clone from stable tag (beta source is identical, avoids branch drift breakage)
          if ($channel -eq "beta") {
            $stableTagJson = gh release view --repo anomalyco/opencode --json tagName 2>&1
            $stableRef = ($stableTagJson | ConvertFrom-Json).tagName
            git clone --depth 1 --branch $stableRef "https://x-access-token:${{ secrets.OPENCODE_PAT }}@github.com/anomalyco/opencode.git" opencode-src
            Write-Host "Beta: cloned from stable source ref $stableRef"
          } else {
            git clone --depth 1 --branch $ref "https://x-access-token:${{ secrets.OPENCODE_PAT }}@github.com/anomalyco/opencode.git" opencode-src
          }

          Write-Host "Cloned $channel OpenCode ref: $ref"
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT }}

      - name: Apply Copilot JWT patch
        if: steps.filter.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          bun run scripts/patch-copilot.ts opencode-src/packages/opencode/src/plugin/copilot.ts
          if ($LASTEXITCODE -eq 1) {
            Write-Error "Patch script failed — see output above"
            exit 1
          }

      - name: Install dependencies
        if: steps.filter.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          Push-Location opencode-src
          bun install
          Pop-Location

      - name: Build Windows binary
        id: build
        if: steps.filter.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $env:OPENCODE_VERSION = ($version -replace '^v', '')

          Push-Location opencode-src
          bun run ./packages/opencode/script/build.ts
          Pop-Location

          $candidates = @(
            "opencode-src/packages/opencode/dist/opencode-windows-x64/bin/opencode.exe",
            "opencode-src/packages/opencode/dist/opencode-windows-x64-baseline/bin/opencode.exe"
          )
          $exe = $null
          foreach ($path in $candidates) {
            if (Test-Path $path) {
              $exe = $path
              break
            }
          }
          if ($exe) {
            Write-Host "Build successful: $exe"
            Write-Host "Injected OPENCODE_VERSION: $env:OPENCODE_VERSION"
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Binary size: $([math]::Round($size, 1)) MB"
            echo "exe_path=$exe" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "No Windows binary found in dist/"
            Get-ChildItem -Recurse opencode-src/packages/opencode/dist/ -Name | Select-Object -First 30
            exit 1
          }

      - name: Create release
        if: steps.filter.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sha = "${{ steps.version.outputs.sha }}"
          $releaseTag = "${{ steps.version.outputs.release_tag }}"
          $releaseTitle = "${{ steps.version.outputs.release_title }}"
          $assetName = "${{ steps.version.outputs.asset_name }}"
          $sourceRepo = "${{ steps.version.outputs.source_repo }}"
          $channelDisplay = "${{ steps.version.outputs.channel_display }}"
          $exe = "${{ steps.build.outputs.exe_path }}"

          Copy-Item $exe $assetName

          $notes = @"
          Channel: $channelDisplay
          Upstream version: $version

          Patched OpenCode $version ($sha) with Copilot JWT bridge for full model access.

          ## What's included
          - Pre-built Windows x64 binary with JWT token exchange patch
          - Unlocks models available in VS Code Copilot but not yet in OpenCode

          ## Requirements
          - VS Code with GitHub Copilot extension (authenticated)
          - Windows x64

          ## Usage
          1. Download the .exe below
          2. Replace your installed OpenCode binary:
             - Desktop (Stable): ``%LOCALAPPDATA%\OpenCode\opencode-cli.exe``
             - Desktop (Beta): ``%LOCALAPPDATA%\OpenCode Beta\opencode-cli.exe``
             - CLI (Bun): ``%USERPROFILE%\.bun\bin\opencode.exe``
          3. Run ``bun run scripts/discover-models.ts --apply`` to auto-discover and configure new models
          4. Restart OpenCode

          Based on OpenCode $version ($sourceRepo@$sha)
          "@

          $notes = ($notes -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          $notes | Out-File -FilePath notes.md -Encoding utf8

          # Delete existing release if force-building
          gh release view $releaseTag --repo $env:GITHUB_REPOSITORY --json tagName 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Deleting existing release $releaseTag for force rebuild..."
            gh release delete $releaseTag --repo $env:GITHUB_REPOSITORY --yes 2>$null
            # Also delete the tag
            git push origin --delete $releaseTag 2>$null
          }
          $LASTEXITCODE = 0

          gh release create $releaseTag $assetName --title "$releaseTitle" --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
